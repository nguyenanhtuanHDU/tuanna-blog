<div class="form d-flex align-items-center justify-content-center">
  <!-- <img class="form-bg" src="../../assets/images/bg-form4.avif"/> -->
  <div class="form-container">
    <div class="form-inner">
      <div class="form-inner-header d-flex align-items-center justify-content-between mb-4">
        <h2 class="mb-0">Sign Up</h2>
        <div class="form-inner-header__social d-flex gap-3">
          <i class="bi bi-facebook"></i>
          <i class="bi bi-google"></i>
        </div>
      </div>
      <form class="form-inner-body d-flex flex-column" [formGroup]="signInForm">

        <div class="form-inner-body__username">
          <label for="username">Username</label>
          <input type="text" class="form-control mt-3" type="password" id="username" formControlName="password">
        </div>
        <div class="form-inner-body__email">
          <label for="email">Email</label>
          <input type="text" class="form-control mt-3" type="email" formControlName="email" id="email"
            autocomplete="off">
        </div>
        <div class="form-inner-body__password">
          <label for="password">Password</label>
          <input type="text" class="form-control mt-3" type="password" formControlName="password" id="password"
            autocomplete="off">
        </div>

        <div class="form-inner-body__password">
          <label for="password2">Type password again</label>
          <input type="text" class="form-control mt-3" type="password" formControlName="password" id="password2"
            autocomplete="off">
        </div>

        <button type="button" class="btn btn-primary py-2 my-4">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
