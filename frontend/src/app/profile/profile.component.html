<app-header #header></app-header>
<div class="profile">
  <div class="container profile-container">
    <div class="row gutters-sm profile-inner">
      <div class="col-md-4 profile-inner-left px-3 ">
        <div class="profile-inner-left-card p-3 h-100">
          <div class="profile-inner-left-card-body">
            <div class="d-flex flex-column align-items-center text-center">
              <img [src]="avatarPath" alt="Admin" class="rounded-circle" width="150">
              <div class="mt-3">
                <h4>{{user.username}}</h4>
                <p class="text-secondary mb-1">Id: {{user.id}}</p>
                <button class="btn btn-primary">Follow</button>

                <form (ngSubmit)="uploadAvatar()" method="post">
                  <input class="form-control" type="file" name="avatar" (change)="chooseFile($any($event).target.files)" />
                  <button class="btn btn-primary">Upload</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-8 profile-inner-right px-3">
        <div class="profile-inner-right-card py-3 px-5 h-100 d-flex align-items-center">
          <div class="profile-inner-right-card-body w-100">
            <div class="row">
              <div class="col-sm-3">
                <h6 class="mb-0">Username</h6>
              </div>
              <div class="col-sm-9 text-secondary">
                {{user.username}}
              </div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-3">
                <h6 class="mb-0">Email</h6>
              </div>
              <div class="col-sm-9 text-secondary">
                {{user.email}}
              </div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-3">
                <h6 class="mb-0">Address</h6>
              </div>
              <div class="col-sm-9 text-secondary">
                {{user.address}}
              </div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-12">
                <a class="btn btn-info" href="">Edit</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
