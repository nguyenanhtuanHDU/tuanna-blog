<div class="form d-flex align-items-center justify-content-center">
  <!-- <img class="form-bg" src="../../assets/images/bg-form4.avif"/> -->
  <div class=" form-container">
    <div class="row">
      <div class="col-sm-6 col-12 form-inner">
        <div class="form-inner-header d-flex align-items-center justify-content-between mb-4">
          <h2 class="mb-0">Sign In</h2>
          <div class="form-inner-header__social d-flex gap-3">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-google"></i>
          </div>
        </div>
        <form class="form-inner-body d-flex flex-column" [formGroup]="signInForm" (ngSubmit)="getInforLogin()">
          <label for="email" class="mt-3 mb-2">Email</label>
          <input type="text" class="form-control " type="email" formControlName="email" id="email" autocomplete="off">
          <label for="password" class="mt-3 mb-2">Password</label>
          <input type="text" class="form-control " type="password" formControlName="password" id="password">
          <button type="submit" class="btn btn-primary py-2 my-4">
            Sign In
          </button>
        </form>
        <div class=" form-inner-footer d-flex justify-content-between">
          <div class="form-inner-footer__remember d-flex align-items-center">
            <input type="checkbox" id="remember" class="me-2 my-auto">
            <label for="remember">Remember me</label>
          </div>
          <a routerLink="/sign-up">Forgot password ?</a>
        </div>
      </div>
      <div class="col-sm-6 col-0 form-right d-flex align-items-center justify-content-center flex-column gap-3">
        <h2>Welcome to Tuanna Blog</h2>
        <p>Don't have account ?</p>
        <a mat-flat-button routerLink="/sign-up">Sign Up Now</a>
      </div>
    </div>
  </div>
</div>
